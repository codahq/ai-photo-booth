services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3001
      - FRONTEND_ORIGIN=http://localhost:5174
    volumes:
      - photo-storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
    ports:
      - '5174:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  photo-storage:
